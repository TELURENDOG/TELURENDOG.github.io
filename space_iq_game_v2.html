<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;min-height:600px;overflow:hidden;background:#060410}
  body{font-family:'DM Sans',sans-serif;color:#f0eeff;position:relative}
  #bg{position:fixed;inset:0;z-index:0;pointer-events:none}
  #aurora{position:fixed;inset:0;z-index:1;pointer-events:none}
  .aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);animation:aura 18s ease-in-out infinite;opacity:0}
  .a1{width:65vw;height:55vh;top:-15%;left:-15%;background:radial-gradient(ellipse,rgba(139,92,246,0.16),transparent 70%);animation-delay:0s}
  .a2{width:50vw;height:45vh;bottom:-10%;right:-5%;background:radial-gradient(ellipse,rgba(56,189,248,0.12),transparent 70%);animation-delay:-9s}
  .a3{width:38vw;height:38vh;top:40%;left:35%;background:radial-gradient(ellipse,rgba(251,113,133,0.08),transparent 70%);animation-delay:-14s}
  @keyframes aura{0%{opacity:0;transform:scale(.88) translate(0,0)}20%{opacity:1}50%{transform:scale(1.12) translate(4%,5%);opacity:.75}80%{opacity:1}100%{opacity:0;transform:scale(.93) translate(-3%,-3%)}}

  .footer-tag{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none}
  .footer-made{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.22em;color:rgba(192,132,252,.45);text-transform:uppercase;display:flex;align-items:center;gap:5px}
  .footer-made span{color:rgba(192,132,252,.65)}
  .footer-hints{display:flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:50px;padding:5px 14px;gap:10px}
  .footer-hint{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.1em;color:rgba(192,132,252,.4);display:flex;align-items:center;gap:4px;white-space:nowrap}
  .footer-sep{color:rgba(255,255,255,.12);font-size:.6rem;margin:0 2px}

  .game-wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;padding:24px 16px 80px}
  .screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:500px;animation:fadeIn .4s ease}
  .screen.active{display:flex}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .logo{font-family:'Syne',sans-serif;font-size:clamp(2rem,8vw,3.2rem);font-weight:800;letter-spacing:-.02em;background:linear-gradient(130deg,#c084fc 0%,#38bdf8 55%,#fb7185 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;filter:drop-shadow(0 0 24px rgba(192,132,252,.35))}
  .logo-sub{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.35em;color:rgba(192,132,252,.45);text-transform:uppercase;margin-top:5px;margin-bottom:32px}
  .btn-start{padding:14px 48px;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(130deg,rgba(139,92,246,.9),rgba(56,189,248,.7));font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;box-shadow:0 0 40px rgba(139,92,246,.4);transition:transform .25s,box-shadow .25s}
  .btn-start:hover{transform:translateY(-4px);box-shadow:0 0 64px rgba(139,92,246,.65)}

  .q-header{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:14px}
  .q-meta{display:flex;flex-direction:column;gap:2px}
  .q-num{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;color:rgba(192,132,252,.6);text-transform:uppercase}
  .q-cat-badge{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.1em;padding:2px 8px;border-radius:50px;display:inline-block;margin-top:2px}
  .q-timer-wrap{display:flex;align-items:center;gap:6px}
  .q-timer{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:#38bdf8;transition:color .3s;min-width:22px;text-align:right}
  .q-timer.urgent{color:#fb7185;animation:tpulse .5s ease-in-out infinite}
  @keyframes tpulse{0%,100%{opacity:1}50%{opacity:.25}}

  .q-progress{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:22px;overflow:hidden}
  .q-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b5cf6,#38bdf8);transition:width .5s ease}

  .q-card{width:100%;padding:24px 20px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:18px;margin-bottom:14px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 10% 0%,rgba(139,92,246,.09),transparent 55%);pointer-events:none}
  .q-text{font-family:'DM Sans',sans-serif;font-size:clamp(.92rem,3vw,1.1rem);font-weight:500;line-height:1.6;color:#f0eeff;position:relative;z-index:1}

  .q-options{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .q-opt{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.86rem;color:#e2deff;text-align:left;transition:background .18s,border-color .18s,transform .15s;display:flex;align-items:center;gap:12px}
  .q-opt-letter{font-family:'Space Mono',monospace;font-size:.62rem;color:rgba(192,132,252,.5);min-width:14px}
  .q-opt:hover{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.38);transform:translateX(4px)}
  .q-opt.correct{background:rgba(52,211,153,.12)!important;border-color:#34d399!important;color:#34d399!important}
  .q-opt.correct .q-opt-letter{color:#34d399!important}
  .q-opt.wrong{background:rgba(251,113,133,.1)!important;border-color:#fb7185!important;color:#fb7185!important}
  .q-opt.wrong .q-opt-letter{color:#fb7185!important}
  .q-opt.disabled{pointer-events:none}

  .q-feedback{min-height:42px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;font-size:.78rem;line-height:1.7;color:rgba(240,238,255,.55);opacity:0;transition:opacity .3s;text-align:center}
  .q-feedback.show{opacity:1}
  .q-feedback b{color:#c084fc}

  .btn-next{margin-top:12px;padding:10px 28px;border:1px solid rgba(139,92,246,.38);border-radius:50px;background:rgba(139,92,246,.12);cursor:pointer;font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#c084fc;transition:all .2s;display:none}
  .btn-next.show{display:block}
  .btn-next:hover{background:rgba(139,92,246,.26);transform:translateY(-2px)}

  .result-iq{font-family:'Syne',sans-serif;font-size:clamp(4.5rem,18vw,9rem);font-weight:800;background:linear-gradient(130deg,#c084fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:2px;filter:drop-shadow(0 0 32px rgba(139,92,246,.45))}
  .result-label{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.35em;color:rgba(192,132,252,.45);text-transform:uppercase;margin-bottom:18px}
  .result-title{font-family:'Syne',sans-serif;font-size:clamp(.9rem,3.5vw,1.2rem);font-weight:700;color:#f0eeff;margin-bottom:8px;text-align:center}
  .result-roast{font-size:.82rem;color:rgba(240,238,255,.45);line-height:1.8;text-align:center;max-width:340px;margin-bottom:20px}
  .result-cats{display:flex;flex-direction:column;gap:7px;width:100%;margin-bottom:20px}
  .cat-result{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px}
  .cat-result-name{color:rgba(240,238,255,.55);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.08em}
  .cat-result-score{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700}
  .result-score{display:flex;gap:24px;margin-bottom:20px}
  .result-stat{text-align:center}
  .result-stat-num{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#38bdf8}
  .result-stat-lbl{font-size:.58rem;letter-spacing:.14em;color:rgba(240,238,255,.3);text-transform:uppercase;margin-top:2px;font-family:'Space Mono',monospace}
  .btn-retry{padding:11px 28px;border:1px solid rgba(251,113,133,.38);border-radius:50px;background:rgba(251,113,133,.1);cursor:pointer;font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fb7185;transition:all .2s}
  .btn-retry:hover{background:rgba(251,113,133,.22);transform:translateY(-2px)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
</div>

<div class="footer-tag">
  <div class="footer-made">🚀 <span>OTAK GOCEK</span> &nbsp;·&nbsp; MADE BY <span>RISKI RM</span> &nbsp;©&nbsp;2025</div>
  <div class="footer-hints">
    <div class="footer-hint">🧠 Baca soal baik-baik</div>
    <div class="footer-sep">|</div>
    <div class="footer-hint">⏱ Timer 20 detik</div>
    <div class="footer-sep">|</div>
    <div class="footer-hint">🎲 Soal selalu acak</div>
  </div>
</div>

<div class="game-wrap">
  <div class="screen active" id="screen-intro">
    <div class="logo">OTAK GOCEK</div>
    <div class="logo-sub">Tes Kecerdasan Premium</div>
    <button class="btn-start" id="btn-start">Mulai Diuji →</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="q-header">
      <div class="q-meta">
        <div class="q-num" id="q-num">Soal 1 / 10</div>
        <span class="q-cat-badge" id="q-cat-badge"></span>
      </div>
      <div class="q-timer-wrap">
        <div class="q-timer" id="q-timer">20</div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(56,189,248,.5)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      </div>
    </div>
    <div class="q-progress"><div class="q-progress-fill" id="q-pf" style="width:10%"></div></div>
    <div class="q-card"><div class="q-text" id="q-text"></div></div>
    <div class="q-options" id="q-options"></div>
    <div class="q-feedback" id="q-feedback"></div>
    <button class="btn-next" id="btn-next">Lanjut →</button>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-iq" id="result-iq">0</div>
    <div class="result-label">IQ Score</div>
    <div class="result-title" id="result-title"></div>
    <div class="result-roast" id="result-roast"></div>
    <div class="result-cats" id="result-cats"></div>
    <div class="result-score">
      <div class="result-stat"><div class="result-stat-num" id="res-c">0</div><div class="result-stat-lbl">Benar</div></div>
      <div class="result-stat"><div class="result-stat-num" style="color:#fb7185" id="res-w">0</div><div class="result-stat-lbl">Salah</div></div>
      <div class="result-stat"><div class="result-stat-num" style="color:#c084fc" id="res-t">0s</div><div class="result-stat-lbl">Avg Waktu</div></div>
    </div>
    <button class="btn-retry" id="btn-retry">🎲 Soal Lain, Berani?</button>
  </div>
</div>

<script>
const BANK={
  "🧠 Logika":[
    {q:"Kamu punya 3 apel. Kamu ambil 2. Kamu punya berapa?",opts:["1","2","3","0"],ans:1,fb:"Kamu yang <b>ambil 2</b>, jadi kamu pegang 2. Yang 1 sisa di tempat bukan punyamu."},
    {q:"Ada 10 burung di pohon. 1 ditembak. Berapa yang tersisa?",opts:["9","0","10","1"],ans:1,fb:"Bunyi tembakan bikin <b>semua terbang kabur</b>. Yang tertembak jatuh. Sisa = 0."},
    {q:"Kamu di lomba lari, menyalip orang ke-2. Kamu di posisi berapa?",opts:["Posisi 1","Posisi 2","Posisi 3","Posisi 4"],ans:1,fb:"Kamu gantiin posisi 2. <b>Posisi 1 masih di depan.</b> Belum menang bro."},
    {q:"Dokter kasih 3 pil, minum tiap 30 menit. Habis dalam berapa menit?",opts:["90 menit","60 menit","30 menit","120 menit"],ans:1,fb:"Pil 1 diminum → 30 menit → Pil 2 → 30 menit → Pil 3. Total = <b>60 menit</b>, bukan 90."},
    {q:"Rumah 4 sudut, kucing di tiap sudut. Tiap kucing lihat 3 kucing lain. Berapa kucing total?",opts:["4","16","12","8"],ans:0,fb:"Tetap <b>4 kucing</b>. Masing-masing lihat 3 lainnya. Ga ada kucing tambahan."},
    {q:"Pria lihat foto: 'Itu anak ayahku, tapi aku tak punya saudara.' Siapa di foto?",opts:["Temannya","Anaknya sendiri","Saudaranya","Bapaknya"],ans:1,fb:"'Anak dari ayahku' = anaknya sendiri. Dia <b>tidak punya saudara</b>, jadi ya anaknya."},
    {q:"Berapa kali kamu bisa ambil 6 dari 30?",opts:["5 kali","Sekali","Tidak bisa","30 kali"],ans:1,fb:"<b>Sekali</b>. Habis ambil pertama, 30 sudah bukan 30 lagi."},
    {q:"Ada 6 ikan di kolam dan 3 tenggelam. Berapa yang tersisa?",opts:["3","6","0","9"],ans:1,fb:"<b>Ikan tidak bisa tenggelam</b> — mereka hidup di air. Semua 6 masih ada."},
    {q:"Petani punya 17 domba, semua kecuali 9 mati. Berapa yang hidup?",opts:["8","9","17","Tidak ada"],ans:1,fb:"'<b>Semua kecuali 9</b>' = 9 yang masih hidup. Bukan 17-9=8. Kata 'kecuali' yang ngejebak."},
    {q:"Naik ke lantai 5 dari lantai 1. Berapa kali naik tangga antar lantai?",opts:["5 kali","4 kali","3 kali","6 kali"],ans:1,fb:"1→2, 2→3, 3→4, 4→5 = <b>4 kali</b> naik. Bukan 5."},
  ],
  "🔢 Matematika":[
    {q:"Mana yang lebih berat — 1 kg besi atau 1 kg kapas?",opts:["Besi","Kapas","Sama berat","Tergantung"],ans:2,fb:"Keduanya <b>1 kg</b>. Berat sama persis. Yang beda cuma volumenya."},
    {q:"Berapa bulan dalam setahun yang punya 28 hari?",opts:["1 (Februari)","2","6","12"],ans:3,fb:"<b>Semua 12 bulan</b> punya minimal 28 hari. Februari cuma 28/29, tapi bulan lain juga lewati tanggal 28."},
    {q:"1000 + 40 + 1000 + 30 + 1000 + 20 + 1000 + 10 = ?",opts:["5000","4100","4000","4010"],ans:1,fb:"Coba hitung ulang perlahan: hasilnya <b>4100</b>, bukan 5000! Otak auto-isi 5000."},
    {q:"10 dibagi setengah, ditambah 10. Hasilnya?",opts:["15","25","30","Lainnya"],ans:2,fb:"10 ÷ ½ = 10 × 2 = 20. Lalu 20 + 10 = <b>30</b>. 'Dibagi setengah' ≠ dibagi 2!"},
    {q:"Ada 3 pembunuh di ruangan. Masuk 1 orang, bunuh 1. Berapa pembunuh sekarang?",opts:["2","3","4","0"],ans:1,fb:"Yang baru masuk juga pembunuh. Pembunuh lama tetap pembunuh. Total masih <b>3</b>."},
    {q:"Apapun dikali 0 hasilnya?",opts:["0","Angka itu sendiri","Tidak terdefinisi","1"],ans:0,fb:"Apapun dikali 0 = <b>0</b>. Aturan paling dasar matematika."},
    {q:"Ada 30 sapi, 20 makan rumput. Sisanya berapa?",opts:["10","30","0","20"],ans:0,fb:"30 - 20 = <b>10 sapi</b> yang tidak makan rumput. Gampang tapi bikin curiga kan?"},
    {q:"Jika ada 12 ikan di akuarium dan setengahnya 'tenggelam', berapa sisa?",opts:["6","12","0","Semua"],ans:1,fb:"<b>Ikan tidak bisa tenggelam.</b> Jadi 12 semuanya masih ada."},
    {q:"2² + 2² = ?",opts:["4","8","16","44"],ans:1,fb:"2² = 4. 4 + 4 = <b>8</b>. Jangan salah baca jadi (2+2)²."},
    {q:"Setengah dari kata 'dua belas' adalah?",opts:["6","Enam","Tujuh","Dua"],ans:2,fb:"Setengah dari kata 'dua belas' secara huruf = 7 huruf pertama = '<b>tujuh</b>'. Atau 6 kalau angka — tapi ini jebakan bahasa!"},
  ],
  "🌍 Pengetahuan":[
    {q:"Ayam betina di atap miring. Ke mana telurnya jatuh?",opts:["Ke kiri","Ke kanan","Ke bawah","Ayam tidak bertelur di atap"],ans:3,fb:"<b>Ayam tidak bertelur sambil berdiri di atap.</b> Butuh tempat nyaman. Soalnya yang salah."},
    {q:"Tembok Besar China dibangun untuk mencegah apa?",opts:["Banjir","Angin","Invasi dari utara","Kabut"],ans:2,fb:"Dibangun untuk menahan <b>invasi bangsa nomaden utara</b> seperti Mongol dan Xiongnu."},
    {q:"Apa yang selalu datang tapi tidak pernah tiba?",opts:["Kematian","Besok","Mimpi","Uang"],ans:1,fb:"<b>Besok</b> — ketika tiba, ia sudah jadi hari ini. Besok tidak pernah benar-benar 'tiba'."},
    {q:"Mana yang lebih tua: ayam atau telur?",opts:["Ayam","Telur","Sama tua","Tidak ada jawaban"],ans:1,fb:"Secara evolusi, <b>telur</b> — reptil bertelur jauh sebelum ayam ada sebagai spesies."},
    {q:"Gunung Everest ditemukan. Sebelumnya gunung tertinggi di dunia apa?",opts:["K2","Gunung lain","Tetap Everest","Tidak ada"],ans:2,fb:"<b>Tetap Everest.</b> Ditemukan atau tidak, ia tetap gunung yang sama. Manusianya yang belum tahu."},
    {q:"Api dibawa ke luar angkasa. Apa yang terjadi?",opts:["Terbakar lebih besar","Padam","Meledak","Berubah warna"],ans:1,fb:"Tidak ada oksigen di luar angkasa, jadi api <b>langsung padam</b>."},
    {q:"Di mana ikan paus bayar tagihan?",opts:["Di bank laut","Di tepi pantai","Di kasir","Ikan paus tidak bayar tagihan"],ans:3,fb:"Karena <b>ikan paus tidak punya uang</b> dan tidak punya tagihan. Hidupnya damai."},
    {q:"Negara mana yang tidak punya sungai permanen?",opts:["Vatican","Monaco","Saudi Arabia","Semua punya sungai"],ans:2,fb:"<b>Saudi Arabia</b> tidak punya sungai permanen — hanya wadi (sungai kering musiman)."},
    {q:"Apa yang ada di ujung pelangi?",opts:["Pot emas","Hujan","Huruf 'i'","Tidak ada"],ans:2,fb:"Pelangi tak punya ujung fisik. Tapi ujung kata 'pelang<b>i</b>' = huruf '<b>i</b>'. Kejebak!"},
    {q:"Manusia rata-rata butuh berapa jam tidur per hari?",opts:["6 jam","8 jam","10 jam","12 jam"],ans:1,fb:"Rekomendasi medis = <b>8 jam</b> per hari untuk orang dewasa. Tapi siapa yang beneran 8 jam?"},
  ],
  "🗣️ Bahasa":[
    {q:"Kata SALAH dieja S-A-L-A-H. Apa yang salah dari kalimat ini?",opts:["Ejaannya salah","Tidak ada yang salah","Hurufnya kurang","Tidak lengkap"],ans:1,fb:"Ejaan S-A-L-A-H itu <b>benar</b>. Tidak ada yang salah. Otakmu yang ngejebak dirinya sendiri."},
    {q:"Apa antonim kata 'bodoh'?",opts:["Nakal","Pintar","Baik","Malas"],ans:1,fb:"Antonim dari 'bodoh' adalah <b>'pintar'</b>. Semoga kamu tahu ini dari pengalaman pribadi."},
    {q:"Manakah palindrom (dibaca sama dari kedua arah)?",opts:["Kasur","Katak","Kuda","Makan"],ans:1,fb:"<b>'Katak'</b>: K-A-T-A-K dari depan = K-A-T-A-K dari belakang. Palindrom sempurna."},
    {q:"'Bisa' dalam bahasa Indonesia punya berapa arti?",opts:["1","2","3","Lebih dari 3"],ans:3,fb:"<b>'Bisa'</b>: mampu/sanggup, racun ular, dan mungkin/bisa jadi. Bahasa Indonesia penuh kejutan!"},
    {q:"Kata benda dalam 'Anjing itu berlari kencang' adalah?",opts:["Berlari","Kencang","Itu","Anjing"],ans:3,fb:"<b>'Anjing'</b> = kata benda. 'Berlari' = kata kerja, 'kencang' = keterangan, 'itu' = kata tunjuk."},
    {q:"Kalimat mana yang paling baku?",opts:["Saya sudah makan tadi","Saya makan sudah tadi","Tadi makan saya sudah","Makan saya sudah tadi"],ans:0,fb:"'<b>Saya sudah makan tadi</b>' = susunan S-P-K yang paling baku dalam bahasa Indonesia."},
    {q:"Huruf apa yang paling sering muncul di bahasa Indonesia?",opts:["A","E","I","U"],ans:0,fb:"Huruf <b>'A'</b> adalah yang paling sering muncul dalam teks bahasa Indonesia."},
    {q:"Apa yang punya gigi tapi tidak bisa menggigit?",opts:["Zombie tanpa mulut","Sisir","Buaya tidur","Gigi palsu di laci"],ans:1,fb:"<b>Sisir</b> punya 'gigi-gigi' tapi tidak bisa menggigit. Classic riddle."},
    {q:"Sinonim kata 'cepat' adalah?",opts:["Lambat","Gesit","Lama","Pelan"],ans:1,fb:"<b>'Gesit'</b> adalah sinonim dari cepat, juga mengandung makna lincah."},
    {q:"'Abu-abu' termasuk jenis kata apa?",opts:["Kata benda","Kata kerja","Kata sifat","Kata keterangan"],ans:2,fb:"<b>Kata sifat</b> — mendeskripsikan warna/kualitas. Abu-abu adalah warna, jadi kata sifat."},
  ],
  "😂 Absurd":[
    {q:"Berapa kaki kucing jika kita sebut ekornya 'kaki'?",opts:["5","4","6","Tergantung"],ans:1,fb:"<b>Tetap 4 kaki.</b> Menyebut ekor sebagai 'kaki' tidak mengubah anatomi kucing."},
    {q:"Roti ditaruh di punggung kucing lalu dilempar. Apa yang terjadi?",opts:["Melayang selamanya","Mendarat di kaki","Meledak","Tidak terjadi apa-apa"],ans:0,fb:"Paradoks: kucing mendarat di kaki, roti di sisi olesan. Digabung? <b>Melayang selamanya.</b>"},
    {q:"Kenapa bebek menyeberang jalan?",opts:["Ke sisi seberang","Ke supermarket","Supaya tidak disebut ayam","Karena bebas"],ans:0,fb:"Untuk pergi ke <b>sisi seberang</b>. Versi bebek dari lelucon ayam klasik."},
    {q:"Mana yang lebih banyak: bintang di langit atau pasir di pantai?",opts:["Bintang","Pasir","Sama","Tidak bisa dihitung"],ans:1,fb:"Ilmuwan perkirakan <b>butir pasir di Bumi lebih banyak</b> dari bintang di alam semesta teramati."},
    {q:"Apa yang terjadi kalau kamu lempar batu ke laut?",opts:["Batu tenggelam","Laut basah","Ikan kaget","Batu jadi basah"],ans:3,fb:"Yang paling sering dilupakan: <b>batu jadi basah!</b> Laut sudah basah dari sononya."},
    {q:"'Lemari berjalan' atau 'berjalan lemari' yang benar?",opts:["Lemari berjalan","Berjalan lemari","Itu monster","Tergantung kecepatan"],ans:0,fb:"<b>Lemari berjalan</b> = lemari yang sedang berjalan (subjek + predikat). Struktur yang benar."},
    {q:"Kamu punya 10 jari. 2 dipotong. Berapa jari kamu sekarang?",opts:["8","10","2","Tidak ada"],ans:0,fb:"<b>8 jari</b> yang tersisa. 10 - 2 = 8. Semoga hanya di soal ini saja kejadiannya."},
    {q:"Kalau kambing makan sepatu, apa yang dimakan kambing?",opts:["Rumput","Sepatu","Apapun","Kambing tidak makan sepatu"],ans:1,fb:"Soalnya bilang '<b>kambing makan sepatu</b>' — ya berarti sepatu. Percayai soalnya."},
    {q:"Mana yang lebih cepat: panas atau dingin?",opts:["Panas","Dingin","Sama","Tergantung medium"],ans:0,fb:"<b>Panas lebih cepat</b>, karena kamu bisa nyegat dingin (pakai jaket). Ini lawakan, bukan sains."},
    {q:"Berapa lubang yang ada di celana?",opts:["0","2","3","4"],ans:2,fb:"Lubang kaki kiri, kaki kanan, dan <b>lubang pinggang</b> = 3 lubang minimal."},
  ],
};

const CATS=Object.keys(BANK);
const CAT_COLORS={
  "🧠 Logika":{color:"#c084fc",bg:"rgba(192,132,252,.1)",border:"rgba(192,132,252,.25)"},
  "🔢 Matematika":{color:"#38bdf8",bg:"rgba(56,189,248,.1)",border:"rgba(56,189,248,.25)"},
  "🌍 Pengetahuan":{color:"#34d399",bg:"rgba(52,211,153,.1)",border:"rgba(52,211,153,.25)"},
  "🗣️ Bahasa":{color:"#fbbf24",bg:"rgba(251,191,36,.1)",border:"rgba(251,191,36,.25)"},
  "😂 Absurd":{color:"#fb7185",bg:"rgba(251,113,133,.1)",border:"rgba(251,113,133,.25)"},
};

const TIMER_MAX=20;

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function buildQuiz(){
  const quiz=[];
  for(const cat of CATS){const picked=shuffle(BANK[cat]).slice(0,2);picked.forEach(q=>quiz.push({...q,cat}));}
  return shuffle(quiz);
}

let Q=[],cur=0,score=0,tid=null,tl=TIMER_MAX,times=[],answered=false,qStart=0,catScores={};
const $=id=>document.getElementById(id);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

function startGame(){
  Q=buildQuiz();cur=0;score=0;times=[];answered=false;
  catScores={};CATS.forEach(c=>catScores[c]={correct:0,total:0});
  showScreen('screen-quiz');loadQ();
}

function loadQ(){
  answered=false;
  const q=Q[cur];
  $('q-num').textContent=`Soal ${cur+1} / ${Q.length}`;
  $('q-pf').style.width=`${((cur+1)/Q.length)*100}%`;
  $('q-text').textContent=q.q;
  $('q-feedback').classList.remove('show');$('q-feedback').innerHTML='';
  $('btn-next').classList.remove('show');
  const badge=$('q-cat-badge'),col=CAT_COLORS[q.cat];
  badge.textContent=q.cat;badge.style.color=col.color;badge.style.background=col.bg;badge.style.border=`1px solid ${col.border}`;
  const opts=$('q-options');opts.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='q-opt';
    b.innerHTML=`<span class="q-opt-letter">${l}</span>${q.opts[i]}`;
    b.onclick=()=>pick(i);opts.appendChild(b);
  });
  startTimer();qStart=Date.now();
}

function startTimer(){
  clearInterval(tid);tl=TIMER_MAX;
  const el=$('q-timer');el.textContent=tl;el.classList.remove('urgent');
  tid=setInterval(()=>{tl--;el.textContent=tl;if(tl<=5)el.classList.add('urgent');if(tl<=0){clearInterval(tid);if(!answered)timeUp();}},1000);
}

function timeUp(){
  answered=true;times.push(TIMER_MAX);
  const q=Q[cur];catScores[q.cat].total++;
  $('q-options').querySelectorAll('.q-opt').forEach((b,i)=>{b.classList.add('disabled');if(i===q.ans)b.classList.add('correct');});
  $('q-feedback').innerHTML='⏰ Waktu habis! '+q.fb;$('q-feedback').classList.add('show');
  $('btn-next').classList.add('show');
}

function pick(idx){
  if(answered)return;answered=true;clearInterval(tid);
  times.push((Date.now()-qStart)/1000);
  const q=Q[cur];catScores[q.cat].total++;
  $('q-options').querySelectorAll('.q-opt').forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.ans)b.classList.add('correct');
    else if(i===idx&&idx!==q.ans)b.classList.add('wrong');
  });
  if(idx===q.ans){score++;catScores[q.cat].correct++;}
  $('q-feedback').innerHTML=(idx===q.ans?'✓ Benar! ':'✗ Salah. ')+q.fb;
  $('q-feedback').classList.add('show');$('btn-next').classList.add('show');
}

function nextQ(){cur++;if(cur>=Q.length){showResult();return;}loadQ();}

function showResult(){
  showScreen('screen-result');
  const iq=Math.round(72+(score/Q.length)*55);
  const avg=(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1);
  $('result-iq').textContent=iq;$('res-c').textContent=score;$('res-w').textContent=Q.length-score;$('res-t').textContent=avg+'s';
  const catDiv=$('result-cats');catDiv.innerHTML='';
  CATS.forEach(cat=>{
    const cs=catScores[cat],col=CAT_COLORS[cat];
    const d=document.createElement('div');d.className='cat-result';
    d.innerHTML=`<span class="cat-result-name">${cat}</span><span class="cat-result-score" style="color:${col.color}">${cs.correct}/${cs.total}</span>`;
    catDiv.appendChild(d);
  });
  const data=[
    {min:9,t:'Otak Dewa, Manusia Langka 🧠',r:'Hampir sempurna. Kamu tidak bisa dijebak soal beginian. Skripsi pasti selesai tepat waktu.'},
    {min:7,t:'Lumayan, Tapi Tetap Kena Jebak 😏',r:'Di atas rata-rata, tapi otakmu masih auto-pilot di beberapa soal. Latih lagi.'},
    {min:5,t:'Standar Banget, Kayak WiFi Indekos 📶',r:'Tidak jelek, tidak juga bagus. Tepat di tengah-tengah zona nyaman.'},
    {min:3,t:'Otak Butuh Di-charge Dulu 🔋',r:'Soalnya sengaja dibuat gampang dan masih banyak salah. Coba minum air dulu.'},
    {min:0,t:'IQ Setara Layar Matot 📺',r:'Entah gimana bisa salah sebanyak itu. Tapi tenang, layar matot juga berguna — buat cermin.'}
  ];
  const d=data.find(x=>score>=x.min);
  $('result-title').textContent=d.t;$('result-roast').textContent=d.r;
}

$('btn-start').onclick=startGame;
$('btn-next').onclick=nextQ;
$('btn-retry').onclick=startGame;

const cvs=$('bg'),ctx=cvs.getContext('2d');
function resize(){cvs.width=window.innerWidth||680;cvs.height=window.innerHeight||600;}
resize();window.addEventListener('resize',()=>{resize();buildStars();});
let stars=[];
function buildStars(){
  const W=cvs.width,H=cvs.height;
  stars=Array.from({length:260},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,baseA:.05+Math.random()*.5,phase:Math.random()*Math.PI*2,spd:.4+Math.random()*1.1,col:Math.random()<.15?(Math.random()<.5?'160,210,255':'255,200,150'):'255,255,255'}));
}
buildStars();
let t=0;
function draw(){
  ctx.clearRect(0,0,cvs.width,cvs.height);t+=.016;
  stars.forEach(s=>{
    const a=s.baseA*(.5+.5*Math.sin(t*s.spd+s.phase));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.col},${a.toFixed(2)})`;ctx.fill();
    if(s.r>1){ctx.beginPath();ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);ctx.fillStyle=`rgba(${s.col},${(a*.08).toFixed(3)})`;ctx.fill();}
  });
  requestAnimationFrame(draw);
}
draw();
</script>
